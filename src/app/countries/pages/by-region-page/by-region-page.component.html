<div class="text-center">
  <span class="display-6">Search by </span>
  <strong class="display-4">Region</strong>
</div>
<hr />

<div class="row">
  <div class="col">
    <!--search box-->
    <span class="text-muted"> Select a region:</span>
    <!-- <shared-search-box
      [placeholder]="placeholder"
      (onDebounce)="searchByRegion($event)"
    ></shared-search-box> -->
    <button
      *ngFor="let region of regions"
      class="btn mx-2"
      (click)="searchByRegion(region)"
      [ngClass]="{ 'btn-outline-primary': selectedRegion === region }"
    >
      {{ region }}
    </button>
  </div>

  <hr />

  <div class="row">
    <div class="col">
      <countries-table [countries]="countries"></countries-table>
      <div class="d-flex justify-content-center" *ngIf="isLoading">
        <shared-loading-spinner></shared-loading-spinner>
      </div>
    </div>
  </div>
</div>
