<div class="text-center">
  <span class="display-6 text-muted">Search by </span>
  <strong class="display-4">Region</strong>
</div>
<hr />

<div class="row">
  <div class="col">
    <!--search box-->
    <span class="text-muted"> Write to search a region:</span>
    <shared-search-box
      [placeholder]="placeholder"
      (onValue)="searchByRegion($event)"
    ></shared-search-box>
  </div>
</div>

<hr />

<div class="row">
  <div class="col">
    <countries-table [countries]="countries"></countries-table>
  </div>
</div>
