<mat-drawer-container class="sidenav-container">
  <mat-drawer #drawer class="sidenav" mode="over">
    <div class="sidenav-content">
      <mat-list role="list">
        <p class="text-center h4 m-2">Search filters</p>
        <hr />
        <mat-list-item role="listitem" *ngFor="let item of sideNavItems">
          <div class="nav-button text-left">
            <button mat-raised-button [routerLink]="[item.url]">
              <span> {{ item.nombre }}</span>
              <mat-icon
                aria-hidden="false"
                aria-label="Example home icon"
                [fontIcon]="item.icon"
              ></mat-icon>
            </button>
          </div>
        </mat-list-item>
        <mat-list-item role="listitem">
          <div class="nav-button text-left">
            <button
              mat-raised-button
              routerLinkActive="active"
              (click)="cambiarTema()"
            >
              <span> Change theme</span>
              <mat-icon
                aria-hidden="false"
                fontIcon="brightness_medium"
              ></mat-icon>
            </button>
          </div>
        </mat-list-item>
      </mat-list>
    </div>
  </mat-drawer>
  <main class="container">
    <router-outlet class="container"></router-outlet>
  </main>
</mat-drawer-container>
